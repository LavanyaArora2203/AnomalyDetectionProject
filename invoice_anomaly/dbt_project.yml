name: 'invoice_anomaly'
version: '1.0.0'
config-version: 2

profile: 'invoice_anomaly'

model-paths: ["models"]
test-paths:  ["tests"]
macro-paths: ["macros"]
seed-paths:  ["seeds"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  invoice_anomaly:
    raw:
      +schema:       raw
      +materialized: view          # thin pass-through over seeded tables

    staging:
      +schema:       staging
      +materialized: view          # cleaned, typed, renamed

    mart:
      +schema:       mart
      +materialized: table         # feature tables — heavy window functions
