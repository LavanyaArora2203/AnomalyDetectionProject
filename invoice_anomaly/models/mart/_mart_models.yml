version: 2
models:
  - name: fct_invoices
    description: "Central fact table. One row per invoice with enriched vendor + buyer dims."
    columns:
      - name: invoice_id
        tests: [not_null, unique]

  - name: feat_invoice_vendor_behavior
    description: |
      Vendor behavioral features using window functions:
      rolling 30/90-day counts, z-scores, near-duplicate detection,
      velocity spikes, lag/lead amount comparisons.
    columns:
      - name: invoice_id
        tests: [not_null, unique]

  - name: feat_threshold_gaming
    description: |
      Approval threshold evasion signals. Tags invoices within $500
      of common approval limits and counts vendor repeat offences.
    columns:
      - name: invoice_id
        tests: [not_null, unique]

  - name: feat_shell_vendor_signals
    description: |
      Network-level shell vendor detection: shared bank accounts,
      EIN root clustering, wire-only ratio, high-risk country flags,
      composite suspicion score.
    columns:
      - name: invoice_id
        tests: [not_null, unique]

  - name: feat_master
    description: |
      Master ML feature table. Joins all three feature models onto
      a single row per invoice. Direct input to training pipeline.
      Contains 40+ features + rule_based_fraud_score + is_fraud label.
    columns:
      - name: invoice_id
        tests: [not_null, unique]
      - name: is_fraud
        tests: [not_null]
