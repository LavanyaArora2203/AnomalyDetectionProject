version: 2
models:
  - name: stg_invoices
    description: "Cleaned invoices: typed, normalised, with derived date parts and fraud label hierarchy."
    columns:
      - name: invoice_id
        tests: [not_null, unique]
      - name: amount
        tests: [not_null]
      - name: fraud_category
        tests:
          - accepted_values:
              values: ['clean','duplicate','threshold_gaming','shell_vendor','soft_anomaly']

  - name: stg_vendors
    description: "Cleaned vendors with shell cluster and high-risk country flags."
    columns:
      - name: vendor_id
        tests: [not_null, unique]

  - name: stg_buyers
    description: "Cleaned buyers."
    columns:
      - name: buyer_id
        tests: [not_null, unique]

  - name: stg_line_items
    description: "Cleaned line items with unit price buckets."
    columns:
      - name: line_item_id
        tests: [not_null, unique]
      - name: invoice_id
        tests: [not_null]
